name: "Setup UV"
description: "Install UV, set up Python, and install dependencies"

runs:
  using: "composite"
  steps:
    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON }}

    - name: Install dependencies
      shell: bash
      run: |
        uv sync --all-groups
